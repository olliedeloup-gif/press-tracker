<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Samsung Europe Press Release Tracker</title>
<style>
    body {
        font-family: Arial, sans-serif;
        margin: 40px;
        background: #f5f5f5;
    }
    h1 {
        font-size: 28px;
        margin-bottom: 10px;
    }
    input {
        width: 500px;
        padding: 10px;
        font-size: 16px;
    }
    button {
        padding: 10px 20px;
        font-size: 16px;
        cursor: pointer;
    }
    .market {
        background: white;
        padding: 12px;
        margin-top: 10px;
        border-radius: 6px;
        border: 1px solid #ddd;
    }
    .yes { color: green; font-weight: bold; }
    .no { color: red; font-weight: bold; }
</style>
</head>
<body>

<h1>Samsung Europe Press Release Tracker</h1>
<p>Paste a global Samsung News link and click "Check Status".</p>

<input id="hqLink" placeholder="https://news.samsung.com/global/...">
<button onclick="checkAllMarkets()">Check Status</button>

<div id="results"></div>

<script>
const markets = {
    "UK": "https://news.samsung.com/uk/",
    "Germany": "https://news.samsung.com/de/",
    "France": "https://news.samsung.com/fr/",
    "Italy": "https://news.samsung.com/it/",
    "Spain": "https://news.samsung.com/es/",
    "Netherlands": "https://news.samsung.com/nl/",
    "Belgium": "https://news.samsung.com/be/",
    "Sweden": "https://news.samsung.com/se/",
    "Norway": "https://news.samsung.com/no/",
    "Denmark": "https://news.samsung.com/dk/",
    "Finland": "https://news.samsung.com/fi/",
    "Poland": "https://news.samsung.com/pl/"
};

async function fetchHTML(url) {
    try {
        const response = await fetch(url);
        if (!response.ok) return null;
        return await response.text();
    } catch {
        return null;
    }
}

async function checkMarket(marketName, baseUrl, slug) {
    const fullUrl = baseUrl + slug + "/";
    const html = await fetchHTML(fullUrl);

    if (!html) {
        return `<div class="market"><strong>${marketName}:</strong> <span class="no">Not Published</span></div>`;
    }

    const found = html.includes(slug);
    return `<div class="market"><strong>${marketName}:</strong> ${
        found ? `<span class="yes">Published</span>` : `<span class="no">Not Published</span>`
    }</div>`;
}

async function checkAllMarkets() {
    const hqUrl = document.getElementById("hqLink").value.trim();
    if (!hqUrl.includes("news.samsung.com")) {
        alert("Please enter a valid Samsung News link");
        return;
    }

    const slug = hqUrl.split("/").filter(Boolean).pop();

    document.getElementById("results").innerHTML = "<p>Checking markets...</p>";

    let output = "";
    for (const [market, url] of Object.entries(markets)) {
        const result = await checkMarket(market, url, slug);
        output += result;
    }

    document.getElementById("results").innerHTML = output;
}
</script>

</body>
</html>
